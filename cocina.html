<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 ROCKISIMO — Cocina</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/cocina.css">
</head>
<body>

    <div class="cocina-header-bar">
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="img/logo.png" alt="Rockísimo" style="height:36px; width:36px; border-radius:6px; object-fit:cover;">
            <span class="cocina-titulo">🍕 COCINA</span>
        </div>

        <div class="cocina-contadores">
            <span class="cocina-contador-chip pendientes" id="cnt-pendientes">0 pendientes</span>
            <span class="cocina-contador-chip preparando" id="cnt-preparando">0 preparando</span>
        </div>

        <div style="display:flex; align-items:center; gap:15px;">
            <div class="refresh-indicator">
                <div class="refresh-dot"></div>
                <span>En vivo</span>
            </div>
            <span class="cocina-reloj" id="cocina-reloj">--:--:--</span>
        </div>
    </div>

    <div class="cocina-grid" id="contenedor-cocina">
        <div class="cocina-vacia">
            <span class="icono">⏳</span>
            Cargando pedidos...
        </div>
    </div>

    <!-- Scripts en orden de dependencia -->
    <script src="js/storage.js"></script>
    <script src="js/cocina.js"></script>

</body>
</html>
